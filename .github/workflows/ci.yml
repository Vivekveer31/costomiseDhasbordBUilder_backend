name: Nexus Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      PORT: 5000

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Debug Environment (Safe)
      run: |
        if [ -z "$GROQ_API_KEY" ]; then
          echo "❌ GROQ_API_KEY is EMPTY in CI environment"
        else
          echo "✅ GROQ_API_KEY is present (Length: ${#GROQ_API_KEY})"
        fi
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    - name: Health & Chatbot Integration Test
      run: |
        node -e "
        const http = require('http');
        const server = require('./index.js');
        const PORT = 5000;
        
        const checkHealth = () => new Promise((resolve, reject) => {
          http.get('http://localhost:' + PORT + '/health', (res) => {
            if (res.statusCode === 200) resolve();
            else reject(new Error('Health check failed: ' + res.statusCode));
          }).on('error', (err) => reject(new Error('Health request failed: ' + err.message)));
        });

        const checkChat = () => new Promise((resolve, reject) => {
          console.log('Sending chat request to port ' + PORT + '...');
          const req = http.request('http://localhost:' + PORT + '/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
          }, (res) => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              console.log('Chat response status: ' + res.statusCode);
              if (res.statusCode === 200) {
                const body = JSON.parse(data);
                console.log('Chat response body: ' + JSON.stringify(body).substring(0, 100) + '...');
                if (body.message && body.message.includes('Please add your Groq API key')) {
                  reject(new Error('Chat check failed: Secret GROQ_API_KEY is still using placeholder.'));
                } else {
                  resolve();
                }
              } else {
                reject(new Error('Chat check failed: ' + res.statusCode + ' - ' + data));
              }
            });
          });
          req.on('error', (err) => reject(new Error('Chat request failed: ' + err.message)));
          req.write(JSON.stringify({ messages: [{ role: 'user', content: 'hi' }] }));
          req.end();
        });

        console.log('⏳ Waiting 7s for server to initialize...');
        setTimeout(async () => {
          try {
            await checkHealth();
            console.log('✅ Health check passed!');
            await checkChat();
            console.log('✅ Chatbot AI Integrated & Verified!');
            process.exit(0);
          } catch (e) {
            console.error('❌ Integration test failed: ' + e.message);
            process.exit(1);
          }
        }, 7000);
        "
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        PORT: 5000
