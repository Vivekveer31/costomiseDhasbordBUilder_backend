name: Nexus Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      PORT: 5000

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Health & Chatbot Integration Test
      run: |
        node -e "
        const http = require('http');
        const server = require('./index.js');
        
        const checkHealth = () => new Promise((resolve, reject) => {
          http.get('http://localhost:5000/health', (res) => {
            if (res.statusCode === 200) resolve();
            else reject(new Error('Health check failed: ' + res.statusCode));
          }).on('error', reject);
        });

        const checkChat = () => new Promise((resolve, reject) => {
          const req = http.request('http://localhost:5000/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
          }, (res) => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              if (res.statusCode === 200) {
                const body = JSON.parse(data);
                if (body.message && body.message.includes('Please add your Groq API key')) {
                  reject(new Error('Chat check failed: Secret GROQ_API_KEY is not working in CI'));
                } else {
                  resolve();
                }
              } else {
                reject(new Error('Chat check failed: ' + res.statusCode));
              }
            });
          });
          req.on('error', reject);
          req.write(JSON.stringify({ messages: [{ role: 'user', content: 'hi' }] }));
          req.end();
        });

        setTimeout(async () => {
          try {
            await checkHealth();
            console.log('✅ Health check passed!');
            await checkChat();
            console.log('✅ Chatbot AI Integrated & Verified!');
            process.exit(0);
          } catch (e) {
            console.error('❌ Integration test failed: ' + e.message);
            process.exit(1);
          }
        }, 3000);
        "
